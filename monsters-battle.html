<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DM Toolkit · Monsters / Бой</title>
<script src="assets/auth.js?v=58"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f0e0c;--bg2:#161410;--bg3:#1e1b16;--bg4:#252118;
  --border:#3a3020;--border2:#4a4030;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5dfa0;
  --red:#c94c4c;--red2:#e87a7a;--blue:#4c7ac9;--blue2:#7aa8e8;
  --green:#4ca84c;--green2:#7ac97a;--purple:#8a4cc9;--purple2:#b07ae8;
  --teal:#4ac9b0;--teal2:#7ae8d4;
  --text:#e8dcc8;--text2:#b8a888;--text3:#887860;
  --danger-bg:#2a1010;--danger-border:#5a2020;
  --warning-bg:#1e1a08;--warning-border:#4a3c10;
  --info-bg:#0a1020;--info-border:#1a3060;
  --success-bg:#0a1810;--success-border:#1a4020;
  --purple-bg:#1a0a28;--purple-border:#3a1a5a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;line-height:1.5;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:10px 10px 8px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.sidebar-sub{font-size:10px;color:var(--text3);margin-top:1px}
.search-row{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;align-items:center}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:var(--text);font-size:11px;outline:none}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text3)}
.sidebar-list{flex:1;overflow-y:auto;padding:4px}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-group-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:8px 8px 3px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px}
.sb-group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.mon-btn{width:100%;background:none;border:1px solid transparent;border-radius:5px;padding:5px 8px;cursor:pointer;text-align:left;color:var(--text2);transition:all .12s;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.mon-btn:hover{background:var(--bg3);border-color:var(--border);color:var(--text)}
.mon-btn.active{background:var(--bg4);border-color:var(--border2);color:var(--gold)}
.mon-btn-cr{font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 4px;border-radius:2px;flex-shrink:0;font-weight:500}
.mon-btn-info{flex:1;min-width:0}
.mon-btn-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-btn-sub{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-btn-hp{width:100%;height:3px;background:var(--border);border-radius:1px;margin-top:3px}
.mon-btn-hp-fill{height:100%;border-radius:1px;transition:width .3s}
.hp-high{background:var(--green2)}.hp-mid{background:var(--gold2)}.hp-low{background:var(--red2)}.hp-dead{background:#555}

/* Zone colors */
.mon-btn.z-oreol.active{border-color:var(--gold);color:var(--gold2)}
.mon-btn.z-greb.active{border-color:var(--blue);color:var(--blue2)}
.mon-btn.z-yadro.active{border-color:var(--red);color:var(--red2)}

/* Main */
.main{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.placeholder{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3);font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;text-align:center;padding:40px}

/* Combat Panel */
.combat-panel{background:var(--bg2);border-bottom:2px solid var(--border2);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:10}
.cp-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold3);flex-shrink:0}
.cp-hp-block{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;cursor:pointer}
.cp-hp-block:hover .cp-hp-cur{text-shadow:0 0 8px currentColor}
.cp-hp-label{font-size:10px;color:var(--text3);font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.06em}
.cp-hp-cur{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--green2);cursor:pointer;min-width:40px;text-align:center}
.cp-hp-sep{color:var(--text3);font-size:14px}
.cp-hp-max{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text3)}
.cp-hp-bar{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cp-hp-fill{height:100%;border-radius:3px;transition:width .3s}
.cp-dmg-btn{background:var(--danger-bg);border:1px solid var(--red);border-radius:4px;color:var(--red2);padding:3px 8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .12s}
.cp-dmg-btn:hover{background:#3a1010}
.cp-heal-btn{background:var(--success-bg);border:1px solid var(--green);border-radius:4px;color:var(--green2);padding:3px 8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .12s}
.cp-heal-btn:hover{background:#102010}
.cp-reset-btn,.cp-util-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text2);padding:3px 8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .12s}
.cp-reset-btn:hover,.cp-util-btn:hover{border-color:var(--gold);color:var(--gold2);background:var(--bg4)}
.cp-util-btn.danger,.cp-reset-btn.danger{background:var(--danger-bg);border-color:var(--red);color:var(--red2)}
.cp-clone-add{border-color:var(--gold);color:var(--gold2)}
.cp-clone-remove{border-color:var(--danger-border);color:var(--red2);background:var(--danger-bg)}
.cp-ini-box{cursor:pointer;transition:all .12s}.cp-ini-box:hover{border-color:var(--gold);background:var(--bg4)}
.cp-ac-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;text-align:center}
.cp-ac-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--blue2)}
.cp-ac-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.cp-ini-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;text-align:center}
.cp-ini-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold2)}
.cp-ini-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.cp-pp-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;text-align:center}
.cp-pp-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--teal2)}
.cp-pp-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.cp-sp-box,.cp-pass-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;text-align:center}
.cp-sp-val,.cp-pass-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--teal2)}
.cp-sp-lbl,.cp-pass-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.cp-cr-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;text-align:center;max-width:200px}
.cp-cr-val{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--gold2)}
.cp-cr-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* Phase badge */
.phase-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;cursor:pointer;transition:all .12s}
.phase-badge.ph1{background:var(--success-bg);border:1px solid var(--green);color:var(--green2)}
.phase-badge.ph2{background:var(--danger-bg);border:1px solid var(--red);color:var(--red2)}

/* Conditions */
.cond-panel{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.cond-toggle{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-size:11px;transition:all .12s;font-family:'Cinzel',serif;letter-spacing:.04em}
.cond-toggle:hover{border-color:var(--border2);color:var(--text)}
.cond-toggle.on-stun{background:#2a1a00;border-color:#c97a00;color:#e8a84c}
.cond-toggle.on-prone{background:#1a1a0a;border-color:#8a8a4c;color:#c8c87a}
.cond-toggle.on-blind{background:#0a0a1a;border-color:#4c7ac9;color:#7aa8e8}
.cond-toggle.on-restrained{background:#1a0a1a;border-color:#8a4cc9;color:#b07ae8}
.cond-toggle.on-poison{background:#0a1a0a;border-color:#4a8a4a;color:#7ac97a}
.cond-toggle.on-fear{background:#1a0a2a;border-color:#7a4cc9;color:#b07ae8}

/* Dice */
.dice-section{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.dice-btn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 7px;transition:all .12s}
.dice-btn:hover{border-color:var(--gold);color:var(--gold2)}
.dice-output{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold2);background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;min-width:40px;text-align:center;display:inline-block}
.ini-tracker{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.ini-tracker-label{font-family:'Cinzel',serif;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.ini-slot{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer}
.ini-slot.current{border-color:var(--gold);background:var(--bg4)}
.ini-slot-name{font-family:'Cinzel',serif;font-size:9px;color:var(--text2);white-space:nowrap}
.ini-slot-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold2)}
.ini-next-btn{background:var(--bg3);border:1px solid var(--gold);border-radius:4px;color:var(--gold2);padding:2px 8px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.04em}
.ini-clear-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);padding:2px 6px;cursor:pointer;font-size:10px}
.ini-add-manual{display:flex;gap:4px;align-items:center;margin-left:auto}
.ini-manual-name,.ini-manual-val{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;outline:none}
.ini-manual-name{width:120px}.ini-manual-val{width:52px;text-align:center}
.ini-add-btn{background:var(--bg3);border:1px solid var(--gold);border-radius:4px;color:var(--gold2);padding:2px 7px;cursor:pointer;font-family:'Cinzel',serif;font-size:10px}
.ini-remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;line-height:1;padding:0 0 0 2px}.ini-remove-btn:hover{color:var(--red2)}
.rest-row{display:flex;gap:6px;margin-bottom:8px;padding:6px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.new-round-btn,.short-rest-btn,.long-rest-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);padding:4px 10px;cursor:pointer;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.04em;text-transform:uppercase;transition:all .12s}
.new-round-btn:hover,.short-rest-btn:hover,.long-rest-btn:hover{border-color:var(--gold);color:var(--gold2);background:var(--bg4)}
.long-rest-btn{border-color:var(--green);color:var(--green2)}

/* Sheet */
.sheet{padding:12px 16px 40px;flex:1}
.sheet-header{padding:12px 16px;border-radius:8px;margin-bottom:10px;border:1px solid var(--border)}
.sheet-header.z-oreol{background:var(--warning-bg);border-color:var(--warning-border)}
.sheet-header.z-greb{background:var(--info-bg);border-color:var(--info-border)}
.sheet-header.z-yadro{background:var(--danger-bg);border-color:var(--danger-border)}
.sh-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sh-icon{font-size:20px}
.sh-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold3)}
.sh-en{font-size:12px;color:var(--text3);font-style:italic}
.sh-sub{font-size:12px;color:var(--text2);font-style:italic}
.sh-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;border:1px solid;letter-spacing:.04em}
.tag-danger{background:var(--danger-bg);border-color:var(--red);color:var(--red2)}
.tag-warning{background:var(--warning-bg);border-color:var(--gold);color:var(--gold2)}
.tag-info{background:var(--info-bg);border-color:var(--blue);color:var(--blue2)}
.tag-success{background:var(--success-bg);border-color:var(--green);color:var(--green2)}
.tag-neutral{background:var(--bg3);border-color:var(--border2);color:var(--text2)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--bg2);padding:3px;border-radius:7px;border:1px solid var(--border);flex-wrap:wrap}
.tab-btn{flex:1;padding:5px 3px;border:none;border-radius:5px;background:transparent;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;color:var(--text3);transition:all .12s;text-transform:uppercase;min-width:50px}
.tab-btn:hover{color:var(--text);background:var(--bg3)}
.tab-btn.active{background:var(--bg4);color:var(--gold);border:1px solid var(--border2)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 3px;text-align:center}
.stat-name{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.stat-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold3);line-height:1}
.stat-mod{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:1px}
.stat-box.hi .stat-val{color:var(--red2)}
.stat-box.hi .stat-mod{color:var(--red2)}

/* Highlight boxes (ОЗ, КД, Инит, П.Восп) */
.highlight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.hl-box{border-radius:6px;padding:8px 5px;text-align:center;border:1px solid}
.hl-box.z-oreol{background:var(--warning-bg);border-color:var(--gold)}
.hl-box.z-greb{background:var(--info-bg);border-color:var(--blue)}
.hl-box.z-yadro{background:var(--danger-bg);border-color:var(--red)}
.hl-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.hl-box.z-oreol .hl-label{color:var(--gold)}
.hl-box.z-greb .hl-label{color:var(--blue2)}
.hl-box.z-yadro .hl-label{color:var(--red2)}
.hl-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1.1}
.hl-box.z-oreol .hl-val{color:var(--gold2)}
.hl-box.z-greb .hl-val{color:var(--blue2)}
.hl-box.z-yadro .hl-val{color:var(--red2)}
.hl-sub{font-size:10px;margin-top:2px}
.hl-box.z-oreol .hl-sub{color:var(--gold)}
.hl-box.z-greb .hl-sub{color:var(--blue)}
.hl-box.z-yadro .hl-sub{color:var(--red)}

.core-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px}
.core-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
.core-label{font-size:10px;color:var(--text3)}
.core-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);font-weight:500}

/* Section headers */
.sec{margin-bottom:10px}
.sec-h{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sec-h::before{content:'';display:inline-block;width:3px;height:11px;background:var(--gold);border-radius:1px}

/* Attack cards */
.atk-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:6px}
.atk-card-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.atk-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--text);flex:1}
.atk-bonus{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gold2);flex-shrink:0}
.atk-dmg{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--red2);flex-shrink:0}
.atk-type{font-size:10px;color:var(--text3);flex-shrink:0;background:var(--bg4);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.atk-range{font-size:10px;color:var(--text2);margin-top:1px}
.atk-note{font-size:11px;color:var(--text2);line-height:1.4;margin-top:3px}
.atk-btn-row{display:flex;gap:5px;align-items:center;margin-top:6px}
.atk-roll-btn{flex:1;background:var(--bg4);border:1px solid var(--gold);border-radius:5px;color:var(--gold2);padding:4px 8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;transition:all .12s}
.atk-roll-btn:hover{background:var(--warning-bg);border-color:var(--gold2)}
.atk-dmg-btn{background:var(--danger-bg);border:1px solid var(--red);border-radius:5px;color:var(--red2);padding:4px 8px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .12s}
.atk-dmg-btn:hover{background:#3a1010}
.atk-inline-result{font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 8px;border-radius:4px;margin-top:3px;min-height:0;transition:all .2s;line-height:1.6}
.atk-inline-result.show{background:var(--bg4);border:1px solid var(--border2)}
.r-d20{font-size:16px;font-weight:700}.r-hit{color:var(--gold2)}.r-miss{color:var(--text3)}.r-crit{color:var(--red2)}.r-dmg{color:var(--red2);font-size:15px;font-weight:700}.r-label{color:var(--text3);font-size:10px}

/* Ability cards */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.ab-card{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 8px}
.ab-card.highlight{border-color:var(--border2);background:var(--bg4)}
.ab-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);margin-bottom:2px}
.ab-desc{font-size:11px;color:var(--text2);line-height:1.35}

/* Counter-mechanics */
.km-box{background:var(--bg3);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:2px solid}
.km-box.z-oreol{background:var(--warning-bg);border-color:var(--gold)}
.km-box.z-greb{background:var(--info-bg);border-color:var(--blue)}
.km-box.z-yadro{background:var(--danger-bg);border-color:var(--red)}
.km-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.km-box.z-oreol .km-label{color:var(--gold)}
.km-box.z-greb .km-label{color:var(--blue2)}
.km-box.z-yadro .km-label{color:var(--red2)}
.km-text{font-size:14px;line-height:1.6;font-weight:600}
.km-box.z-oreol .km-text{color:var(--gold3)}
.km-box.z-greb .km-text{color:var(--blue2)}
.km-box.z-yadro .km-text{color:var(--red2)}

/* Phase 2 box */
.phase2-box{background:var(--danger-bg);border:1px solid var(--red);border-radius:6px;padding:10px 12px;margin-bottom:10px}
.phase2-title{font-family:'Cinzel',serif;font-size:11px;color:var(--red2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.phase2-indicator{width:8px;height:8px;border-radius:50%;background:var(--red2);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.phase2-text{font-size:12px;color:var(--text2);line-height:1.5}

/* Defense tab */
.def-row{display:flex;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:4px;border:1px solid var(--border);margin-bottom:4px;align-items:flex-start}
.def-key{font-size:11px;color:var(--text3);min-width:110px;flex-shrink:0;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;text-transform:uppercase}
.def-val{font-size:11px;color:var(--text);line-height:1.4}

/* Legendary actions */
.la-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:5px;padding:6px 8px;margin-bottom:4px}
.la-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);margin-bottom:2px}
.la-desc{font-size:11px;color:var(--text2);line-height:1.35}
.re-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:5px;padding:6px 8px;margin-bottom:4px}
.re-name{font-family:'Cinzel',serif;font-size:10px;color:var(--teal2);margin-bottom:2px}
.re-desc{font-size:11px;color:var(--text2);line-height:1.35}

/* HP modal */
.hp-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.hp-modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;min-width:240px}
.hp-modal-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:12px;text-align:center}
.hp-modal-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:20px;text-align:center;outline:none;margin-bottom:10px}
.hp-modal-input:focus{border-color:var(--gold)}
.hp-modal-btns{display:flex;gap:6px}
.hp-modal-dmg{flex:1;background:var(--danger-bg);border:1px solid var(--red);border-radius:5px;color:var(--red2);padding:7px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.hp-modal-heal{flex:1;background:var(--success-bg);border:1px solid var(--green);border-radius:5px;color:var(--green2);padding:7px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.hp-modal-cancel{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text3);padding:7px 12px;cursor:pointer;font-size:12px}

/* Dice floating */
.dice-modal{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;z-index:100;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.dice-modal-title{font-family:'Cinzel',serif;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dice-modal-result{font-family:'JetBrains Mono',monospace;font-size:28px;color:var(--gold2);text-align:center;margin:6px 0;font-weight:700;line-height:1}
.dice-modal-detail{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);text-align:center;margin-bottom:4px}
.dice-modal-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px}
.dice-modal.crit .dice-modal-result{color:var(--red2)}
.dice-modal.fumble .dice-modal-result{color:var(--text3)}

/* DM Toolkit badge */
.dm-tool-badge{position:fixed;top:8px;right:12px;z-index:50;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);background:rgba(15,14,12,.86);border:1px solid var(--border2);border-radius:999px;padding:4px 10px;pointer-events:none}
.sidebar-sub a{color:var(--gold2);text-decoration:none}.sidebar-sub a:hover{text-decoration:underline}

@media(max-width:700px){
  .app{flex-direction:column;height:auto}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .ab-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .highlight-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

if(window.ANOMALY_MONSTERS){MS.push(...window.ANOMALY_MONSTERS);}

function ensureMmMonsterLoaded(monsterId){
  if(!window.MM_ADAPTER)return null;
  const raw=String(monsterId||'');
  const match=/^mm-(\d+)$/.exec(raw);
  if(!match)return null;
  if(MS.some(m=>String(m.id)===raw))return getMon(raw);
  const idx=parseInt(match[1],10);
  const mmList=window.MM_ADAPTER.buildBattleMonsters();
  const found=mmList[idx];
  if(!found)return null;
  MS.push(found);
  STATE[String(found.id)]=makeState(found);
  return found;
}

/* ── State ── */
const STATE={};
const CLONES=[];
const INITIATIVE=[];
let cloneSeq=1;
let turnIndex=0;
function makeState(m){return{hp:m.hp,conds:{},phase:1,roll:{},ini:null}}
MS.forEach(m=>{STATE[String(m.id)]=makeState(m)});
let cur=null,tab='combat';
function keyOf(m){return String(m&&m.id)}
function allMonsters(){return [...CLONES,...MS]}
function getMon(id){const sid=String(id);return allMonsters().find(m=>String(m.id)===sid)}
function baseOf(m){return m&&m.isClone?MS.find(x=>x.id===m.baseId):m}
function cleanName(n){return String(n||'').replace(/\s+#\d+$/,'')}

/* ── Dice ── */
function rollDie(sides){return Math.floor(Math.random()*sides)+1}
function parseDice(str){
  const expr=String(str||'').replace(/\s+/g,'');
  const parts=expr.match(/[+-]?\d+к\d+|[+-]?\d+/g)||[];
  const groups=[];
  let flat=0;
  parts.forEach(part=>{
    const sign=part.startsWith('-')?-1:1;
    const clean=part.replace(/^[+-]/,'');
    const m=/^(\d+)к(\d+)$/.exec(clean);
    if(m){
      const n=parseInt(m[1]),s=parseInt(m[2]);
      const rolls=Array.from({length:n},()=>rollDie(s)*sign);
      groups.push({rolls,sides:s,sign});
    }else if(/^\d+$/.test(clean)){
      flat+=sign*parseInt(clean);
    }
  });
  const rolls=groups.flatMap(g=>g.rolls);
  return{total:rolls.reduce((a,b)=>a+b,0)+flat,rolls,groups,flat,sides:groups[0]?.sides||1};
}
function showDiceModal(title,result,detail,isCrit){
  const dm=document.getElementById('dice-modal');
  dm.className='dice-modal'+(isCrit?' crit':'');
  document.getElementById('dice-modal-title').textContent=title;
  document.getElementById('dice-modal-result').textContent=result;
  document.getElementById('dice-modal-detail').textContent=detail;
  dm.style.display='block';
  clearTimeout(dm._t);
  dm._t=setTimeout(()=>dm.style.display='none',4000);
}
function rollAttack(atk,isAdv){
  const d1=rollDie(20),d2=rollDie(20);
  const d20=isAdv?Math.max(d1,d2):d1;
  const total=d20+(parseInt(atk)||0);
  const isCrit=d20===20,isFumble=d20===1;
  return{d20,total,isCrit,isFumble};
}
function rollDamage(diceStr,bonus,isCrit){
  if(!diceStr)return{total:bonus,text:String(bonus)};
  const r=parseDice(diceStr);
  let rolls=[...r.rolls];
  if(isCrit && r.groups){
    const extra=[];
    r.groups.forEach(g=>{
      extra.push(...Array.from({length:g.rolls.length},()=>rollDie(g.sides)*g.sign));
    });
    rolls=[...rolls,...extra];
  }
  const t=rolls.reduce((a,b)=>a+b,0)+(r.flat||0)+(parseInt(bonus)||0);
  const add=(r.flat||0)+(parseInt(bonus)||0);
  return{total:t,text:`[${rolls.join('+')}]${add>0?'+'+add:add<0?add:''}`};
}

function addPackToCombat(packId){
  const ids=(window.ANOMALY_MONSTER_PACKS||[]).find(p=>p.id===packId)?.monsterIds||[];
  ids.map(getMon).filter(Boolean).forEach(m=>createClone(m));
  if(ids.length){
    const firstClone=CLONES[CLONES.length-ids.length];
    if(firstClone) selectMon(firstClone.id);
  }
}
function handlePackQuery(){
  const q=new URLSearchParams(location.search);
  const pack=q.get('pack');
  const monster=q.get('monster');
  if(pack) addPackToCombat(pack);
  if(monster){
    ensureMmMonsterLoaded(monster);
    const m=getMon(monster);
    if(m) selectMon(m.id);
  }
}

function selectMon(id){
  cur=getMon(id);
  if(!cur)return;
  tab='combat';
  buildSidebar();
  renderFull();
}

function createClone(source){
  const base=baseOf(source||cur);
  if(!base)return;
  const sameExisting=CLONES.filter(c=>c.baseId===base.id).length;
  const cid='clone-'+(cloneSeq++);
  const clone={...base,id:cid,baseId:base.id,isClone:true,nm:`${base.nm} #${sameExisting+1}`,en:base.en,ly:base.ly};
  CLONES.push(clone);
  STATE[keyOf(clone)]=makeState(clone);
  cur=clone;
  tab='combat';
  buildSidebar();
  renderFull();
}
function removeClone(id){
  const sid=String(id);
  const idx=CLONES.findIndex(c=>String(c.id)===sid);
  if(idx<0)return;
  CLONES.splice(idx,1);
  delete STATE[sid];
  removeFromInitiative(sid,false);
  if(cur&&keyOf(cur)===sid){cur=null;tab='combat';}
  buildSidebar();
  renderFull();
}
function clearClones(){
  CLONES.slice().forEach(c=>removeFromInitiative(keyOf(c),false));
  CLONES.splice(0,CLONES.length);
  Object.keys(STATE).filter(k=>k.startsWith('clone-')).forEach(k=>delete STATE[k]);
  if(cur&&String(cur.id).startsWith('clone-'))cur=null;
  buildSidebar();
  renderFull();
}
function resetCombat(){
  MS.forEach(m=>{STATE[String(m.id)]=makeState(m)});
  CLONES.splice(0,CLONES.length);
  Object.keys(STATE).filter(k=>k.startsWith('clone-')).forEach(k=>delete STATE[k]);
  INITIATIVE.splice(0,INITIATIVE.length);
  turnIndex=0;
  cur=null;tab='combat';
  buildSidebar();renderFull();
}

/* ── Initiative / encounter control ── */
function parseBonus(str){
  const m=String(str||'').match(/[+-]?\d+/);
  return m?parseInt(m[0],10):0;
}
function hasAdvantageText(str){return /преим/i.test(String(str||''));}
function upsertInitiative(mon,val){
  const id=keyOf(mon);
  const old=INITIATIVE.find(x=>x.id===id);
  if(old){old.val=val;old.name=mon.nm;old.z=mon.z;old.manual=false;}
  else INITIATIVE.push({id,val,name:mon.nm,z:mon.z,manual:false});
  INITIATIVE.sort((a,b)=>b.val-a.val || String(a.name).localeCompare(String(b.name),'ru'));
  turnIndex=Math.max(0,Math.min(turnIndex,INITIATIVE.length-1));
}
function rollInitiativeCurrent(){
  if(!cur)return;
  const bonus=parseBonus(cur.ini);
  const d1=rollDie(20),d2=rollDie(20);
  const d20=hasAdvantageText(cur.ini)?Math.max(d1,d2):d1;
  const total=d20+bonus;
  STATE[keyOf(cur)].ini=total;
  upsertInitiative(cur,total);
  showDiceModal(`Инициатива: ${cur.nm}`,total,`d20(${d20}) ${bonus>=0?'+':''}${bonus}${hasAdvantageText(cur.ini)?' · с преимуществом':''}`,d20===20);
  renderFull();
}
function addManualInitiative(){
  const nameEl=document.getElementById('ini-manual-name');
  const valEl=document.getElementById('ini-manual-val');
  const name=(nameEl&&nameEl.value.trim())||'Игрок';
  const val=parseInt(valEl&&valEl.value,10);
  if(!Number.isFinite(val))return;
  const id='manual-'+Date.now();
  INITIATIVE.push({id,val,name,z:'manual',manual:true});
  INITIATIVE.sort((a,b)=>b.val-a.val || String(a.name).localeCompare(String(b.name),'ru'));
  if(nameEl)nameEl.value='';
  if(valEl)valEl.value='';
  renderFull();
}
function removeFromInitiative(id,rerender=true){
  const sid=String(id);
  const idx=INITIATIVE.findIndex(x=>x.id===sid);
  if(idx>=0)INITIATIVE.splice(idx,1);
  turnIndex=Math.max(0,Math.min(turnIndex,INITIATIVE.length-1));
  if(rerender)renderFull();
}
function iniJump(i){
  if(i<0||i>=INITIATIVE.length)return;
  turnIndex=i;
  const item=INITIATIVE[turnIndex];
  const mon=item&&!item.manual?getMon(item.id):null;
  if(mon)cur=mon;
  buildSidebar();
  renderFull();
}
function nextTurn(){
  if(!INITIATIVE.length)return;
  turnIndex=(turnIndex+1)%INITIATIVE.length;
  const item=INITIATIVE[turnIndex];
  const mon=item&&!item.manual?getMon(item.id):null;
  if(mon)cur=mon;
  buildSidebar();
  renderFull();
}
function clearInitiative(){INITIATIVE.splice(0,INITIATIVE.length);turnIndex=0;renderFull();}
function renderInitiativeTracker(){
  let html=`<div class="ini-tracker"><span class="ini-tracker-label">Инициатива:</span>`;
  if(INITIATIVE.length){
    html+=INITIATIVE.map((it,i)=>`<div class="ini-slot ${i===turnIndex?'current':''}" onclick="iniJump(${i})"><span class="ini-slot-name">${it.manual?'👤 ':''}${it.name}</span><span class="ini-slot-val">${it.val}</span><button class="ini-remove-btn" onclick="event.stopPropagation();removeFromInitiative('${it.id}')">×</button></div>`).join('');
    html+=`<button class="ini-next-btn" onclick="nextTurn()">→ След.</button><button class="ini-clear-btn" onclick="clearInitiative()">✕</button>`;
  }else{
    html+=`<span style="color:var(--text3);font-size:10px">Нажмите на блок «Иниц.» у монстра или добавьте значение вручную</span>`;
  }
  html+=`<div class="ini-add-manual"><input class="ini-manual-name" id="ini-manual-name" placeholder="Имя (игрок)" maxlength="18"><input class="ini-manual-val" id="ini-manual-val" type="number" placeholder="20"><button class="ini-add-btn" onclick="addManualInitiative()">+</button></div></div>`;
  return html;
}

    <button class="cp-reset-btn danger" onclick="resetCombat()" title="Сбросить ОЗ, состояния, инициативу и копии монстров">↺ бой</button>
    <div class="cp-ac-box"><div class="cp-ac-val" style="color:${zc.light}">${m.ac}</div><div class="cp-ac-lbl">КД</div></div>
    <div class="cp-ini-box" onclick="rollInitiativeCurrent()" title="Бросить инициативу и добавить в трекер"><div class="cp-ini-val">${m.ini}</div><div class="cp-ini-lbl">Иниц.</div></div>
    <div class="cp-sp-box"><div class="cp-sp-val">${m.spd}</div><div class="cp-sp-lbl">Скор.</div></div>
    <div class="cp-pass-box"><div class="cp-pass-val">${m.pp}</div><div class="cp-pass-lbl">Пасс ВСПР</div></div>
    ${m.ph2?`<span class="phase-badge ${s.phase===1?'ph1':'ph2'}" onclick="togglePhase()" title="Переключить фазу">Фаза ${s.phase}</span>`:''}
    <div class="cond-panel">
      ${Object.entries(condNames).map(([k,v])=>`<button class="cond-toggle${s.conds[k]?' on-'+k:''}" onclick="toggleCond('${k}')">${v}</button>`).join('')}
    </div>
    <div class="dice-section">
      ${['4','6','8','10','12','20'].map(d=>`<button class="dice-btn" onclick="quickDice(${d})">к${d}</button>`).join('')}
      <span class="dice-output" id="quick-out">—</span>
    </div>
  </div>
  ${renderInitiativeTracker()}

  <div class="sheet">
    <div class="sheet-header z-${m.z}">
      <div class="sh-row1">
        <span class="sh-title">${m.nm}</span>
        <span class="sh-en">${m.en}</span>
      </div>
      <div class="sh-sub">${m.sz} · ${m.ly} · CR ${m.cr} · ${m.xp} опыта</div>
      <div class="sh-tags">
        <span class="tag tag-${zTag}">${zLabel}</span>
        <span class="tag tag-${zTag}">CR ${m.cr}</span>
        <span class="tag tag-neutral">${m.spd}</span>
        ${m.ph2?`<span class="tag tag-danger">Двухфазный</span>`:''}
      </div>
    </div>

    <div class="highlight-grid">
      <div class="hl-box z-${m.z}"><div class="hl-label">ОЗ</div><div class="hl-val">${s.hp}</div><div class="hl-sub">${m.hpF}</div></div>
      <div class="hl-box z-${m.z}"><div class="hl-label">КД</div><div class="hl-val">${m.ac}</div><div class="hl-sub">${m.acN||'—'}</div></div>
      <div class="hl-box z-${m.z}"><div class="hl-label">Инициатива</div><div class="hl-val">${m.ini}</div><div class="hl-sub">от ЛОВ ${modStr(m.st.dex)}</div></div>
      <div class="hl-box z-${m.z}"><div class="hl-label">П. Восприятие</div><div class="hl-val">${m.pp}</div><div class="hl-sub">Пасс. Внимат.</div></div>
    </div>

    <div class="stats-grid">
      ${STATS.map(([l,k])=>{
        const v=m.st[k],r=modStr(v),hi=v>=20;
        return`<div class="stat-box${hi?' hi':''}"><div class="stat-name">${l}</div><div class="stat-val">${v}</div><div class="stat-mod">${r}</div></div>`;
      }).join('')}
    </div>

    <div class="core-grid">
      <div class="core-box"><span class="core-label">Спасброски</span><span class="core-val" style="font-size:11px">${m.sv}</span></div>
      <div class="core-box"><span class="core-label">Скорость</span><span class="core-val">${m.spd}</span></div>
    </div>

    <div class="tabs">
      ${TABS.map(t=>`<button class="tab-btn${tab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.lb}</button>`).join('')}
    </div>
    <div class="tab-content active" id="tc">${tabContent}</div>
  </div>
  `;
}

function render(){renderFull();}

function switchTab(t){tab=t;renderFull();}

function toggleCond(k){
  if(!cur)return;
  const s=STATE[keyOf(cur)];
  s.conds[k]=!s.conds[k];
  renderFull();
}
function togglePhase(){
  if(!cur||!cur.ph2)return;
  const s=STATE[keyOf(cur)];
  s.phase=s.phase===1?2:1;
  renderFull();
}

function doAtkRoll(idx){
  const m=cur;if(!m)return;
  const a=m.at[idx];
  const bonus=parseInt(a.a)||0;
  const r=rollAttack(bonus,false);
  const el=document.getElementById(`roll-r-${idx}`);
  if(!el)return;
  el.className='atk-inline-result show';
  let cls=r.isCrit?'r-crit':r.isFumble?'r-miss':'r-hit';
  let label=r.isCrit?'КРИТ!':(r.isFumble?'ПРОВАЛ':r.total>=12?'Попадание':'Промах?');
  el.innerHTML=`<span class="${cls} r-d20">${r.d20}</span> <span class="r-label">d20</span> <span style="color:var(--text3)">+${bonus}</span> = <span class="${cls}" style="font-size:14px;font-weight:700">${r.total}</span> <span class="r-label">${label}</span>`;
  showDiceModal(`Атака: ${a.n}`,r.total,`d20(${r.d20}) + ${bonus}${r.isCrit?' ⚡КРИТ':''}`,r.isCrit);
}
function doDmgRoll(idx,isCrit){
  const m=cur;if(!m)return;
  const a=m.at[idx];
  const r=rollDamage(a.dice,a.bonus,isCrit);
  const el=document.getElementById(`roll-r-${idx}`);
  if(!el)return;
  el.className='atk-inline-result show';
  el.innerHTML=`${isCrit?'<span class="r-crit">💥КРИТ </span>':''}<span class="r-label">Урон: </span><span class="r-dmg">${r.total}</span> <span class="r-label">${r.text}</span>`;
  showDiceModal(isCrit?`КРИТ: ${a.n}`:`Урон: ${a.n}`,r.total,r.text,isCrit);
}
function doSvRoll(idx){
  const d=rollDie(20);
  const el=document.getElementById(`roll-r-${idx}`);
  if(!el)return;
  el.className='atk-inline-result show';
  el.innerHTML=`<span class="r-label">к20: </span><span class="${d===20?'r-crit':d===1?'r-miss':'r-hit'} r-d20">${d}</span> <span class="r-label">(СБ цели)</span>`;
  showDiceModal('Бросок кубика',d,'к20 (ГМ добавляет бонус цели)',d===20);
}
function quickDice(sides){
  const r=rollDie(sides);
  document.getElementById('quick-out').textContent=r;
  showDiceModal(`к${sides}`,r,`Результат к${sides}`,r===sides);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeHpModal();
});

buildSidebar();
handlePackQuery();
if(!cur) selectMon(1);
</script>
</body>
</html>
